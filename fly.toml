app = 'ercinemabot'
primary_region = 'iad'

[build]

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  memory = '1gb'

[http_service]
  auto_start_machines = false
  auto_stop_machines = 'off'
  force_https = true
  internal_port = 8080
  min_machines_running = 0
  processes = ['app']
